<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#141210" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/aurum.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/aurum.svg" />
    <title>Aurum — Personal Finance</title>
    <script>
      // Apply persisted theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('aurum.theme') || 'system';
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
          var accent = localStorage.getItem('aurum.accent');
          if (accent) document.documentElement.setAttribute('data-accent', accent);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
